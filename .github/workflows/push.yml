name: "publicacion web"
run-name: "publicacion web"
on: [push] 
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: "Instalar dependencias"
        run: |
          npm install
      - name: "Construir proyecto"
        run: |
          npm run build
      - name: "Corregir nombres de carpetas y referencias (_astro -> astro)"
        run: |
          # 1. Renombrar físicamente cualquier carpeta que empiece con "_" dentro de docs (ej. _astro -> astro)
          # Buscamos directorios que empiecen con _ y los renombramos usando "mv"
          find docs -type d -name "_*" | while read dir; do
            nuevo_nombre=$(echo "$dir" | sed 's/\/_/\//g')
            mv "$dir" "$nuevo_nombre"
          done

          # 2. Reemplazar las referencias de texto dentro de TODOS los archivos procesados
          # Esto busca "/_astro" y lo cambia por "/astro" en archivos html, js y css
          find docs -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i 's/\/_/\//g' {} +
      - name: "Guardar cambios en docs"
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs 